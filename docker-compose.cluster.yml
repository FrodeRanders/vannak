# Docker Compose for a 3-node Vannak Raft cluster.
#
# Nodes discover each other via explicit peer specs using Docker's internal
# DNS (container name → IP resolution). No CoreDNS or static IPs needed.
#
# Usage:
#   docker compose -f docker-compose.cluster.yml build
#   docker compose -f docker-compose.cluster.yml up -d
#   docker compose -f docker-compose.cluster.yml down -v

services:
  vannak-1:
    build:
      context: ..
      dockerfile: vannak/Dockerfile
    image: vannak-node:local
    container_name: vannak-1
    volumes:
      - vannak-1-data:/data
    command: 0.0.0.0 10081 vannak-1 /data vannak-2@vannak-2:10081 vannak-3@vannak-3:10081

  vannak-2:
    build:
      context: ..
      dockerfile: vannak/Dockerfile
    image: vannak-node:local
    container_name: vannak-2
    volumes:
      - vannak-2-data:/data
    command: 0.0.0.0 10081 vannak-2 /data vannak-1@vannak-1:10081 vannak-3@vannak-3:10081

  vannak-3:
    build:
      context: ..
      dockerfile: vannak/Dockerfile
    image: vannak-node:local
    container_name: vannak-3
    volumes:
      - vannak-3-data:/data
    command: 0.0.0.0 10081 vannak-3 /data vannak-1@vannak-1:10081 vannak-2@vannak-2:10081

volumes:
  vannak-1-data:
  vannak-2-data:
  vannak-3-data:
